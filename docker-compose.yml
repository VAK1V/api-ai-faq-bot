version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: faq_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faq_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faq_password}
      POSTGRES_DB: ${POSTGRES_DB:-faq_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faq_user} -d ${POSTGRES_DB:-faq_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: faq_backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faq_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faq_password}
      POSTGRES_DB: ${POSTGRES_DB:-faq_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MODEL_REPO: ${MODEL_REPO:-t-tech/T-lite-it-2.1-GGUF}
      MODEL_FILE: ${MODEL_FILE:-T-lite-it-2.1-Q4_K_M.gguf}
      MAX_TEXT_LENGTH: ${MAX_TEXT_LENGTH:-500}
      MAX_TOKENS: ${MAX_TOKENS:-256}
      N_THREADS: ${N_THREADS:-4}
      N_CTX: ${N_CTX:-4096}
      TEMPERATURE: ${TEMPERATURE:-0.7}
      API_KEY: ${API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
  model_cache:
